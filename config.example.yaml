# 笔记推送系统配置
# API Key 通过环境变量设置，不要在配置文件中明文填写
vault_path: ""

llm:
  api_key: "${DEEPSEEK_API_KEY}"
  model: "deepseek-chat"
  timeout: "30s"
  base_url: "https://api.deepseek.com"

search:
  juejin:
    enabled: true
  google:
    enabled: false
    api_key: "${GOOGLE_API_KEY}"
    cse_id: "${GOOGLE_CSE_ID}"

push:
  email:
    smtp_host: "smtp.qq.com"
    smtp_port: 587
    username: "${EMAIL_USER}"
    password: "${EMAIL_PASS}"
    from: "${EMAIL_USER}"
    to: "${EMAIL_TO}"

db:
  path: "./data/push.db"
